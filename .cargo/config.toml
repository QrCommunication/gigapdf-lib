# Cargo aliases so contributors never have to type the bare target triple.
#
#   cargo wasm        → release build of the WASM engine
#   cargo wasm-dev    → debug build (faster compile, larger artifact)
#
# The artifact lands at target/wasm32-unknown-unknown/release/gigapdf_wasm.wasm;
# `sdk/scripts/build-wasm.sh` (run via `pnpm --filter @qrcommunication/gigapdf-lib
# build:wasm`) copies it next to the SDK as the friendly `gigapdf.wasm`.
[alias]
wasm = "build -p gigapdf-wasm --target wasm32-unknown-unknown --release"
wasm-dev = "build -p gigapdf-wasm --target wasm32-unknown-unknown"

# RustCrypto (RSA blinding) and Boa need an entropy source. On wasm there is no
# OS RNG, so getrandom's `custom` backend is selected here for the wasm target
# only; `crates/wasm/src/rng.rs` implements it as a single host import
# (env.gp_host_random) filled from crypto.getRandomValues — keeping the engine
# wasm-bindgen-free. Native targets keep their default OS backend (this cfg is
# wasm-only), so it never affects tests.
[target.wasm32-unknown-unknown]
rustflags = ['--cfg', 'getrandom_backend="custom"']
